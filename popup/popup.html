<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1><img src="../assets/icons/ligamagic-logo.png" alt=""> LigaMagic Prices</h1>

  <div class="row">
    <span>Mostrar preços</span>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span>Tipo de preço</span>
    <select id="priceType">
      <option value="p">Menor</option>
      <option value="m">Médio</option>
      <option value="g">Maior</option>
    </select>
  </div>

  <div class="row">
    <span>Modo de Exportação para a Liga</span>
    <select id="exportMethod">
      <option value="p">Personalizar Deck</option>
      <option value="m">Auto Criar Deck</option>
    </select>
  </div>
  
  <div class="row quality-row">
    <span>Qualidade / Estado da carta</span>
    <div class="quality-boxes" id="qualityBoxes">
      <label title="Nova (M)"><input type="checkbox" data-q="1" unchecked>M</label>
      <label title="Praticamente Nova (NM)"><input type="checkbox" data-q="2" checked>NM</label>
      <label title="Usada Levemente (SP)"><input type="checkbox" data-q="3" unchecked>SP</label>
      <label title="Usada Moderadamente (MP)"><input type="checkbox" data-q="4" unchecked>MP</label>
      <label title="Muito Usada (HP)"><input type="checkbox" data-q="5" unchecked>HP</label>
      <label title="Danificada (D)"><input type="checkbox" data-q="6" unchecked>D</label>
    </div>
  </div>

  <div class="row state-row">
    <div class="state-header">
      <span>Estado das lojas</span>
      <div class="state-actions">
        <button class="btn-mini" id="stateAll">Todos</button>
        <button class="btn-mini" id="stateNone">Nenhum</button>
      </div>
    </div>
    <div class="state-boxes" id="stateBoxes">
      <label title="Acre"><input type="checkbox" data-uf="AC">AC</label>
      <label title="Alagoas"><input type="checkbox" data-uf="AL">AL</label>
      <label title="Amazonas"><input type="checkbox" data-uf="AM">AM</label>
      <label title="Amapá"><input type="checkbox" data-uf="AP">AP</label>
      <label title="Bahia"><input type="checkbox" data-uf="BA">BA</label>
      <label title="Ceará"><input type="checkbox" data-uf="CE">CE</label>
      <label title="Distrito Federal"><input type="checkbox" data-uf="DF">DF</label>
      <label title="Espírito Santo"><input type="checkbox" data-uf="ES">ES</label>
      <label title="Goiás"><input type="checkbox" data-uf="GO">GO</label>
      <label title="Maranhão"><input type="checkbox" data-uf="MA">MA</label>
      <label title="Minas Gerais"><input type="checkbox" data-uf="MG">MG</label>
      <label title="Mato Grosso do Sul"><input type="checkbox" data-uf="MS">MS</label>
      <label title="Mato Grosso"><input type="checkbox" data-uf="MT">MT</label>
      <label title="Pará"><input type="checkbox" data-uf="PA">PA</label>
      <label title="Paraíba"><input type="checkbox" data-uf="PB">PB</label>
      <label title="Pernambuco"><input type="checkbox" data-uf="PE">PE</label>
      <label title="Piauí"><input type="checkbox" data-uf="PI">PI</label>
      <label title="Paraná"><input type="checkbox" data-uf="PR">PR</label>
      <label title="Rio de Janeiro"><input type="checkbox" data-uf="RJ">RJ</label>
      <label title="Rio Grande do Norte"><input type="checkbox" data-uf="RN">RN</label>
      <label title="Rondônia"><input type="checkbox" data-uf="RO">RO</label>
      <label title="Roraima"><input type="checkbox" data-uf="RR">RR</label>
      <label title="Rio Grande do Sul"><input type="checkbox" data-uf="RS">RS</label>
      <label title="Santa Catarina"><input type="checkbox" data-uf="SC">SC</label>
      <label title="Sergipe"><input type="checkbox" data-uf="SE">SE</label>
      <label title="São Paulo"><input type="checkbox" data-uf="SP">SP</label>
      <label title="Tocantins"><input type="checkbox" data-uf="TO">TO</label>
    </div>
  </div>

  <div class="stats" id="stats">
    <em>Abra um deck no Archidekt para ver estatísticas.</em>
  </div>

  <div class="stats">
    <em>Talvez você tenha que recarregar a página para a extensão reconhecer o deck</em>
  </div>

  <button class="primary" id="refresh">Atualizar preços da página</button>
  <button id="clearCache">Limpar cache de preços</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
